name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Build first: apps/studio typechecks against the built .d.ts of the
      # workspace packages (@drx-dls/tokens, @drx-dls/webawesome), so their
      # dist must exist before `typecheck` runs.
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test --if-present
      - run: npm run lint --if-present
